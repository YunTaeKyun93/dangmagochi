name: Backend CI

on:
  push:
    branches: [develop, main]
    paths:
      - "backend/**"
      - "ml/**"
      - ".github/**"
  pull_request:
    branches: [develop, main]
    paths:
      - "backend/**"
      - "ml/**"
      - ".github/**"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

  test:
    name: Test & Build
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest -v
        env:
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET_KEY: test-secret-key-for-ci
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
          REFRESH_TOKEN_EXPIRE_DAYS: 7

      - name: Docker build check
        working-directory: ${{ github.workspace }}
        run: docker build -f backend/Dockerfile -t dangmagochi-backend:${{ github.sha }} .

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push
        working-directory: ${{ github.workspace }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: dangmago-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build --platform linux/amd64 \
            -f backend/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push .

      - name: Run DB Migration
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster dangmago-backend \
            --task-definition dangmago-migrate \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-09a70b69d7391f5f4,subnet-045071261f2f4e1a3,subnet-02ab81afd1c8e05ab,subnet-07bd1132b11cfed4a],securityGroups=[sg-0097b1a1de2b2e5fb],assignPublicIp=ENABLED}" \
            --region ap-northeast-2 \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task ARN: $TASK_ARN"

          aws ecs wait tasks-stopped \
            --cluster dangmago-backend \
            --tasks $TASK_ARN \
            --region ap-northeast-2

          echo "Migration completed"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster dangmago-backend \
            --service dangmago-backend-service-gb8hxei0 \
            --force-new-deployment \
            --region ap-northeast-2